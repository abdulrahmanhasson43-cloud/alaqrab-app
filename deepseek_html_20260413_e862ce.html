<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion · 双模引擎</title>

    <!-- ═══════════════════════════════════════════
         字体引擎 — 10种字体 (5阿拉伯 + 5英文)
         通过Firebase字段 fontFamily 全局控制
    ═══════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&family=Almarai:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ═══════════════════════════════════════════
           CSS变量与重置
        ═══════════════════════════════════════════ */
        :root {
            --font-family: 'Cairo', sans-serif;
            --primary-green: #14f068;
            --landing-bg: #02201b;
            --glass-blur: blur(25px) saturate(180%);
            --border-light: rgba(255,255,255,0.2);
            --loader-bg: #6333a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 隐藏所有区块，由JS控制显示 */
        #landing-section, #login-section, #profile-default, #profile-premium {
            display: none;
            width: 100%;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════════
           3D玻璃加载器 (动画完全限制在玻璃面板内)
        ═══════════════════════════════════════════ */
        #glass-loader {
            position: fixed;
            inset: 0;
            background: var(--loader-bg);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s;
        }
        .loader-scene {
            position: relative;
            width: 300px;
            height: 300px;
            perspective: 1200px;
        }
        .glass-pane {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 40px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .fan-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform-style: preserve-3d;
        }
        .moving-card {
            position: absolute;
            width: 70px;
            height: 100px;
            border-radius: 12px;
            left: 50%;
            top: 50%;
            margin-left: -35px;
            margin-top: -50px;
            animation: moveCard 4s ease-in-out infinite alternate;
        }
        @keyframes moveCard {
            0% { transform: translateZ(-120px) rotate(0deg) scale(0.4); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) rotate(var(--mr)) translateZ(-20px); opacity: 0.9; }
        }

        /* ═══════════════════════════════════════════
           深绿色落地页 (源自旧代码，重新布局Header)
        ═══════════════════════════════════════════ */
        #landing-section {
            background: var(--landing-bg);
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.6s;
        }
        .landing-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }
        .brand-logo {
            height: 45px;
            object-fit: contain;
        }
        .glass-login-btn {
            background: rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-weight: 700;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: 0.2s;
        }
        .landing-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .landing-title {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            max-width: 350px;
            margin-bottom: 50px;
        }
        .get-started-btn {
            background: var(--primary-green);
            color: #02201b;
            padding: 20px 50px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(20,240,104,0.3);
        }

        /* ═══════════════════════════════════════════
           登录界面 (Logo左，登录右，重构布局)
        ═══════════════════════════════════════════ */
        #login-section {
            background: #011310;
            padding: 30px;
            flex-direction: column;
        }
        .login-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .login-glass-card {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 30px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
        }
        .login-glass-card h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        .input-group input {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #fff;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary-green);
        }
        .login-submit {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
        }

        /* ═══════════════════════════════════════════
           默认模板 — 完全保留旧代码UI (简洁专业)
        ═══════════════════════════════════════════ */
        #profile-default {
            background: #0f172a;
            padding: 30px 20px;
        }
        .default-container {
            max-width: 450px;
            margin: 0 auto;
        }
        .default-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }
        .default-pfp {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .default-links {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
        }
        .default-link {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }
        .default-booking-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-green);
            border: none;
            border-radius: 30px;
            color: #02201b;
            font-weight: 800;
            margin: 20px 0;
            cursor: pointer;
        }

        /* ═══════════════════════════════════════════
           高级模板 (碎玻璃) — 长方形头像+发光网格
        ═══════════════════════════════════════════ */
        #profile-premium {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 40px 20px;
        }
        .premium-container {
            max-width: 480px;
            margin: 0 auto;
        }
        .glass-panel {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 28px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: skew(-2deg);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .glass-panel > * { transform: skew(2deg); }
        .premium-pfp {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.8);
            margin-bottom: 15px;
            transform: rotate(-3deg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .premium-links {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 16px;
            margin-top: 10px;
        }
        .premium-link {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 22px;
            padding: 18px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transform: skew(-2deg);
            transition: 0.3s;
        }
        .premium-link > * { transform: skew(2deg); }
        .premium-link i {
            font-size: 30px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px var(--glow));
        }
        .premium-link:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.8);
            transform: skew(-2deg) translateY(-4px);
        }
        .premium-booking-btn {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 25px;
            color: #fff;
            font-weight: 700;
            margin: 20px 0;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transform: skew(-2deg);
        }
        .premium-booking-btn > span { transform: skew(2deg); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 3D玻璃加载器 -->
    <div id="glass-loader">
        <div class="loader-scene">
            <div class="fan-cards">
                <div class="moving-card" style="background:#ff4757; --mx:-100px; --my:-80px; --mr:45deg;"></div>
                <div class="moving-card" style="background:#2ed573; --mx:120px; --my:50px; --mr:-30deg;"></div>
                <div class="moving-card" style="background:#1e90ff; --mx:-30px; --my:110px; --mr:15deg;"></div>
                <div class="moving-card" style="background:#ffa502; --mx:80px; --my:-90px; --mr:-60deg;"></div>
            </div>
            <div class="glass-pane">
                <i class="fa-solid fa-crown fa-spin" style="font-size:40px; color:var(--primary-green);"></i>
            </div>
        </div>
    </div>

    <!-- 落地页 (Header: Logo左，登录右) -->
    <section id="landing-section">
        <header class="landing-header">
            <img src="https://i.ibb.co/vzYfF3f/scorpion-logo.png" class="brand-logo" alt="Logo">
            <div class="glass-login-btn" onclick="showSection('login-section')">تسجيل الدخول</div>
        </header>
        <div class="landing-content">
            <h1 class="landing-title">رابط واحد ذكي<br>لكل شيء في وقت واحد</h1>
            <button class="get-started-btn" onclick="showSection('login-section')">ابدأ الآن</button>
        </div>
    </section>

    <!-- 登录页 (Header Logo左，登录右) -->
    <section id="login-section">
        <div class="login-header">
            <img src="https://i.ibb.co/vzYfF3f/scorpion-logo.png" style="height:45px;">
            <div style="color:white; font-weight:700;">تسجيل الدخول</div>
        </div>
        <div class="login-glass-card">
            <h2>مرحباً بك</h2>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="login-email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="login-submit" onclick="handleLogin()">دخول النظام</button>
            <p style="text-align:center; margin-top:20px; opacity:0.7; cursor:pointer;" onclick="showSection('landing-section')">العودة للرئيسية</p>
        </div>
    </section>

    <!-- 默认模板视图 (旧代码UI) -->
    <section id="profile-default">
        <div class="default-container">
            <div class="default-card">
                <img id="default-pfp" class="default-pfp" src="https://i.pravatar.cc/300?img=12">
                <h2 id="default-name">...</h2>
                <p id="default-bio" style="opacity:0.7;">...</p>
            </div>
            <div id="default-links-container" class="default-links"></div>
            <button id="default-booking-btn" class="default-booking-btn" style="display:none;" onclick="openBooking()">احجز موعداً</button>
        </div>
    </section>

    <!-- 高级模板视图 (碎玻璃) -->
    <section id="profile-premium">
        <div class="premium-container">
            <div class="glass-panel">
                <div style="text-align:center;">
                    <img id="premium-pfp" class="premium-pfp" src="https://i.pravatar.cc/300?img=12">
                    <h2 id="premium-name" style="font-size:26px;">...</h2>
                    <p id="premium-bio" style="color:#cbd5e1;">...</p>
                </div>
            </div>
            <button id="premium-booking-btn" class="premium-booking-btn" style="display:none;" onclick="openBooking()"><span>احجز موعداً</span></button>
            <div id="premium-links-container" class="premium-links"></div>
        </div>
    </section>

    <!-- 预约弹窗 (完整功能) -->
    <div id="bookingModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:2000; display:none; align-items:center; justify-content:center;">
        <div style="background:rgba(20,20,20,0.9); border-radius:30px; padding:25px; width:90%; max-width:400px; color:#fff;">
            <h3>حجز موعد</h3>
            <input id="booking-name" placeholder="الاسم" style="width:100%; padding:14px; margin:10px 0; border-radius:15px; background:#2a2a2a; border:none; color:#fff;">
            <input id="booking-phone" placeholder="الهاتف" style="width:100%; padding:14px; margin:10px 0; border-radius:15px; background:#2a2a2a; border:none; color:#fff;">
            <input type="date" id="booking-date" style="width:100%; padding:14px; margin:10px 0; border-radius:15px; background:#2a2a2a; border:none; color:#fff;">
            <button onclick="submitBooking()" style="background:var(--primary-green); padding:16px; width:100%; border:none; border-radius:30px; font-weight:bold;">تأكيد</button>
            <button onclick="closeBooking()" style="background:transparent; border:1px solid #555; width:100%; margin-top:10px; padding:12px; border-radius:30px; color:#fff;">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase配置 (请替换为你的项目)
        const firebaseConfig = {
            apiKey: "AIzaSyAxxWhIBlC92x_T4lBjDj7p7B3hrvhVZYg",
            authDomain: "alaqrab-system.firebaseapp.com",
            projectId: "alaqrab-system",
            storageBucket: "alaqrab-system.firebasestorage.app",
            messagingSenderId: "660494503813",
            appId: "1:660494503813:web:3f45fc069b3506f8657eec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let targetUserId = window.location.hash.replace(/^#\/?/, '').trim() || null;
        let currentTemplate = 'default'; // 默认为default

        // 显示区块
        window.showSection = (id) => {
            ['landing-section', 'login-section', 'profile-default', 'profile-premium'].forEach(s => {
                document.getElementById(s).style.display = 'none';
            });
            document.getElementById(id).style.display = id.includes('profile') ? 'block' : 'flex';
        };

        // 触发加载器并跳转 (模拟登录后)
        window.triggerLoaderAndGo = () => {
            const loader = document.getElementById('glass-loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    loader.style.opacity = '1';
                    if (!targetUserId) targetUserId = 'demo_user';
                    initProfile();
                }, 500);
            }, 3000);
        };

        window.handleLogin = () => {
            // 此处可接入Firebase Auth，现模拟登录
            alert("سيتم توجيهك إلى لوحة التحكم (محاكاة)");
            targetUserId = 'demo_user';
            triggerLoaderAndGo();
        };

        // 预约
        window.openBooking = () => document.getElementById('bookingModal').style.display = 'flex';
        window.closeBooking = () => document.getElementById('bookingModal').style.display = 'none';
        window.submitBooking = async () => {
            const name = document.getElementById('booking-name').value.trim();
            const phone = document.getElementById('booking-phone').value.trim();
            const date = document.getElementById('booking-date').value;
            if(!name||!phone||!date) return alert("املأ جميع الحقول");
            try {
                await addDoc(collection(db, "users", targetUserId, "bookings"), {
                    userName: name, userPhone: phone, date, type: 'regular', createdAt: new Date()
                });
                alert("تم الحجز بنجاح");
                closeBooking();
            } catch(e) { alert("خطأ في الحجز"); }
        };

        // 渲染12+社交平台 (恢复全部)
        const platformList = [
            { key:'whatsapp', icon:'fa-brands fa-whatsapp', label:'واتساب', color:'#25d366' },
            { key:'facebook', icon:'fa-brands fa-facebook', label:'فيسبوك', color:'#1877f2' },
            { key:'instagram', icon:'fa-brands fa-instagram', label:'انستجرام', color:'#e4405f' },
            { key:'tiktok', icon:'fa-brands fa-tiktok', label:'تيك توك', color:'#fff' },
            { key:'youtube', icon:'fa-brands fa-youtube', label:'يوتيوب', color:'#ff0000' },
            { key:'snapchat', icon:'fa-brands fa-snapchat', label:'سناب', color:'#fffc00' },
            { key:'x', icon:'fa-brands fa-x-twitter', label:'إكس', color:'#fff' },
            { key:'linkedin', icon:'fa-brands fa-linkedin', label:'لينكدإن', color:'#0a66c2' },
            { key:'threads', icon:'fa-brands fa-threads', label:'ثريدز', color:'#fff' },
            { key:'truecaller', icon:'fa-solid fa-phone', label:'تروكولر', color:'#0055ff' },
            { key:'googlemaps', icon:'fa-solid fa-map-location-dot', label:'خرائط', color:'#34a853' },
            { key:'googlereviews', icon:'fa-solid fa-star', label:'تقييمات', color:'#f4b400' }
        ];

        function renderLinks(linksData, containerId, isPremium) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            platformList.forEach(p => {
                const url = linksData?.[p.key] || '#';
                if(url && url !== '#') {
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    if(isPremium) {
                        a.className = 'premium-link';
                        a.style.setProperty('--glow', p.color);
                        a.innerHTML = `<i class="${p.icon}" style="color:${p.color}"></i><span>${p.label}</span>`;
                    } else {
                        a.className = 'default-link';
                        a.innerHTML = `<i class="${p.icon}" style="font-size:24px; margin-bottom:8px; color:${p.color}"></i><span>${p.label}</span>`;
                    }
                    container.appendChild(a);
                }
            });
        }

        function initProfile() {
            const userRef = doc(db, "users", targetUserId);
            onSnapshot(userRef, (snap) => {
                let data = snap.exists() ? snap.data() : {
                    displayName: "Alexander Pierce",
                    bio: "Digital Creator & Consultant",
                    photoURL: "https://i.pravatar.cc/300?img=68",
                    templateMode: "premium",   // 改为 "default" 则显示默认模板
                    enableBooking: true,
                    fontFamily: "Cairo",
                    socials: {
                        whatsapp: "https://wa.me/123", instagram: "https://instagram.com", tiktok: "#"
                    }
                };
                
                // 字体引擎
                if(data.fontFamily) {
                    document.documentElement.style.setProperty('--font-family', data.fontFamily);
                }
                
                // 双模板控制：只有 templateMode === "premium" 才启用高级模板
                const usePremium = data.templateMode === 'premium';
                
                // 更新资料
                document.getElementById('default-name').innerText = data.displayName || '';
                document.getElementById('default-bio').innerText = data.bio || '';
                document.getElementById('default-pfp').src = data.photoURL || '';
                document.getElementById('premium-name').innerText = data.displayName || '';
                document.getElementById('premium-bio').innerText = data.bio || '';
                document.getElementById('premium-pfp').src = data.photoURL || '';

                renderLinks(data.socials || {}, 'default-links-container', false);
                renderLinks(data.socials || {}, 'premium-links-container', true);

                const showBooking = data.enableBooking === true;
                document.getElementById('default-booking-btn').style.display = showBooking ? 'block' : 'none';
                document.getElementById('premium-booking-btn').style.display = showBooking ? 'block' : 'none';

                // 根据templateMode显示对应模板
                if (usePremium) {
                    showSection('profile-premium');
                } else {
                    showSection('profile-default');
                }
            });
        }

        // 路由判断
        if (!targetUserId) {
            showSection('landing-section');
        } else {
            document.getElementById('glass-loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('glass-loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('glass-loader').style.display = 'none';
                    initProfile();
                }, 500);
            }, 2500);
        }
    </script>
</body>
</html>
