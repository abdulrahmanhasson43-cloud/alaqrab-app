<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Aqrab Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ═══════════════════════════════════════════
           ROOT TOKENS
        ═══════════════════════════════════════════ */
        :root {
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --ios-blue: #007aff;
            --ios-blue-grad: linear-gradient(135deg, #007aff, #0056b3);
            --ios-alert-bg: rgba(240, 240, 240, 0.95);
            --orange-brand: #ff6600;
            --vip-gold: #d4af37;
            --dark-navy: #0f172a;
            --ios-input-bg: rgba(255, 255, 255, 0.5); /* Off-white glass for inputs */
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #f5f5f7; /* Off-white background */
            font-family: 'Amiri', serif;
            overflow-x: hidden; color: var(--text-main);
            scrollbar-width: none; -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { display: none; }

        /* ═══════════════════════════════════════════
           CLIENT APP
        ═══════════════════════════════════════════ */
        .app-container { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; direction: ltr; }

        .hero-bg { position: fixed; top: 0; width: 100%; max-width: 430px; height: 55vh; z-index: 1; overflow: hidden; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .hero-bg::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; background: linear-gradient(to bottom, rgba(245,245,247,0), #f5f5f7); }

        .fog-panel {
            position: relative; z-index: 5; margin-top: 45vh;
            background: rgba(253, 253, 253, 0.6); backdrop-filter: blur(45px) saturate(190%); /* Off-white glass */
            -webkit-backdrop-filter: blur(45px) saturate(190%);
            border-radius: 40px 40px 0 0; border: 1px solid var(--glass-border);
            padding: 40px 20px 120px; min-height: 60vh;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.03);
            animation: panelUp 0.9s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes panelUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .header-content { text-align: center; margin-bottom: 30px; }
        .name-wrapper { display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .name-wrapper h1 {
            margin: 0; font-size: 32px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;
            font-family: 'Amiri', 'Playfair Display', serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .title-text { font-size: 14px; color: #444; letter-spacing: 1px; display: block; margin-top: 4px; }

        .action-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 35px; padding: 0 5px; }
        .shard-btn {
            flex: 1; height: 55px; background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.2));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--ios-blue); text-decoration: none;
            border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            transform: skew(-12deg);
        }
        .shard-btn > i { transform: skew(12deg); }
        .shard-btn:active { transform: skew(-12deg) scale(0.92); background: #fff; }
        .shard-btn:nth-child(1) { border-radius: 18px 6px 14px 6px; flex: 1.1; }
        .shard-btn:nth-child(2) { border-radius: 6px 16px 6px 12px; margin-top: -3px; flex: 0.9; }
        .shard-btn:nth-child(3) { border-radius: 12px 6px 16px 6px; margin-top: 3px; flex: 1; }
        .shard-btn:nth-child(4) { border-radius: 6px 14px 6px 18px; flex: 1.1; }

        .save-btn {
            width: 100%; height: 56px; background: var(--ios-blue); color: #fff;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; margin-bottom: 45px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(0,122,255,0.2);
        }
        .save-btn:active { transform: scale(0.98); opacity: 0.9; }

        .section-label { font-size: 16px; font-weight: 700; color: #333; margin: 30px 10px 12px; text-align: right; direction: rtl; }
        .glass-card {
            display: flex; align-items: center; background: rgba(255,255,255,0.55);
            padding: 18px; border-radius: 22px; text-decoration: none;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.7);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer;
            direction: rtl; text-align: right; box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }
        .glass-card:active { background: rgba(255,255,255,0.9); transform: scale(0.98); }
        .card-icon {
            width: 44px; height: 44px; border-radius: 14px; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            margin-left: 15px; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .card-text { flex: 1; }
        .card-text strong { display: block; font-size: 18px; color: var(--text-main); margin-bottom: 2px; }
        .card-text span { font-size: 14px; color: #555; }

        .about-box {
            background: rgba(255,255,255,0.35); border-radius: 28px;
            padding: 35px 20px; margin-top: 40px; border: 1px solid rgba(255,255,255,0.4); text-align: center;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin: 25px 0; padding-bottom: 25px; border-bottom: 1px dashed rgba(0,0,0,0.1);
        }
        .stat-item b { display: block; font-size: 22px; color: var(--text-main); }
        .stat-item span { font-size: 12px; color: #666; }
        .about-p { font-size: 16px; color: #444; line-height: 1.7; margin-bottom: 20px; direction: rtl; }
        .footer-rights { font-size: 13px; color: #777; padding-top: 15px; }

        /* ── Custom Glass Toast Notification ── */
        .glass-toast {
            position: fixed; top: 30px; left: 50%; transform: translate(-50%, -40px);
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6); padding: 14px 28px; border-radius: 30px;
            color: var(--dark-navy); font-weight: 700; font-family: 'Amiri', serif; font-size: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); opacity: 0; transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            z-index: 99999; pointer-events: none; direction: rtl; display: flex; align-items: center; gap: 8px;
        }
        .glass-toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* ── iOS Modals ── */
        .ios-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .ios-alert { width: 270px; background: var(--ios-alert-bg); border-radius: 14px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.15); text-align: center; animation: alertIn 0.3s cubic-bezier(0.2, 1, 0.2, 1); direction: rtl; }
        .ios-alert-body { padding: 20px 16px; }
        .ios-alert-title { font-weight: 700; font-size: 19px; margin-bottom: 4px; color: var(--text-main); }
        .ios-alert-message { font-size: 15px; color: var(--text-main); line-height: 1.5; }
        .ios-alert-button { width: 100%; height: 44px; background: none; border: none; border-top: 0.5px solid rgba(0,0,0,0.15); color: var(--ios-blue); font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Amiri', serif; }
        @keyframes alertIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .ios-action-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9000; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px); }
        .ios-action-sheet { width: 95%; max-width: 410px; margin-bottom: 20px; animation: sheetUp 0.3s ease-out; }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-group { background: var(--ios-alert-bg); border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
        .sheet-btn { width: 100%; height: 56px; background: none; border: none; border-bottom: 0.5px solid rgba(0,0,0,0.1); color: var(--ios-blue); font-size: 20px; font-family: 'Amiri', serif; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sheet-btn.cancel { font-weight: 700; background: #fff; border-radius: 14px; color: #ff3b30; }

        /* ── Booking Modal (Glass Update) ── */
        .booking-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 1500; display: none; align-items: center; justify-content: center; }
        .booking-card { width: 92%; max-width: 400px; background: rgba(250, 250, 252, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 25px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: right; direction: rtl; max-height: 85vh; overflow-y: auto; transition: all 0.5s ease; border: 1px solid rgba(255,255,255,0.7); font-family: 'Amiri', serif; }
        .booking-card.vip-active { background: linear-gradient(135deg, rgba(30,41,59,0.95) 0%, rgba(15,23,42,0.95) 100%); border: 1px solid var(--vip-gold); box-shadow: 0 15px 40px rgba(212,175,55,0.3); color: #fff; }
        
        .switch-tabs { display: flex; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 4px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5); }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 16px; font-weight: 700; cursor: pointer; border-radius: 10px; transition: 0.2s; color: var(--dark-navy); }
        .tab-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: var(--dark-navy); }

        .vip-active .switch-tabs { background: rgba(255,255,255,0.1); border: none; }
        .vip-active .tab-btn { color: #cbd5e1; }
        .vip-active .tab-btn.active { background: var(--vip-gold); color: var(--dark-navy); }
        .vip-active label, .vip-active h3 { color: #fff !important; }
        .vip-active input, .vip-active select { background: rgba(255,255,255,0.1) !important; color: #fff !important; border-color: #475569 !important; }
        .vip-active .price-box { background: rgba(212,175,55,0.1) !important; border-color: var(--vip-gold) !important; color: var(--vip-gold) !important; }

        .input-field { width: 100%; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.6); border-radius: 12px; background: var(--ios-input-bg); box-sizing: border-box; font-family: 'Amiri', serif; font-size: 16px; color: var(--dark-navy); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02); transition: 0.2s; }
        .input-field:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,122,255,0.3); background: #fff; border-color: var(--ios-blue); }
        select.input-field { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230f172a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: left 14px center; background-size: 15px; padding-left: 40px; }
        input[type="date"].input-field { appearance: none; -webkit-appearance: none; text-align: right; }
        input[type="date"].input-field::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; padding-left: 10px; }

        /* ── Custom Branch Cards (Glassmorphism) ── */
        .branch-card {
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.8);
            border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative; overflow: hidden; display: flex; flex-direction: column; text-align: right; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .branch-card.active {
            background: rgba(255,255,255,0.9); border-color: var(--ios-blue);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.15); transform: scale(0.98);
        }
        .branch-card .b-title { font-size: 17px; font-weight: 700; color: var(--dark-navy); display: flex; justify-content: space-between; align-items: center; }
        .branch-card .b-title i.check-icon { color: transparent; transition: 0.3s; font-size: 20px; }
        .branch-card.active .b-title i.check-icon { color: var(--ios-blue); }
        .branch-card .b-days { font-size: 13px; color: #555; margin-top: 6px; font-weight: 400; }

        /* ═══════════════════════════════════════════
           LOADING OVERLAY (EVAPORATION GLASS)
        ═══════════════════════════════════════════ */
        #aqrab-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(245, 245, 247, 0.85); /* Off-white Glass */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: opacity 0.8s ease, transform 0.8s ease; /* Added transform for scale down */
            transform-origin: center;
        }
        #aqrab-loader.evaporate {
            opacity: 0;
            transform: scale(0.85); /* The Evaporation Effect */
        }
        
        .loader-brand {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark-navy);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            direction: ltr;
        }
        
        .loader-subtitle {
            font-family: 'Amiri', serif;
            font-size: 17px;
            color: #555;
            direction: rtl;
        }
    </style>
</head>
<body>

    <div id="glassToast" class="glass-toast"></div>

    <div id="aqrab-loader">
        <div class="loader-brand">Al-Aqrab Premium</div>
        <div class="loader-subtitle">جاري إعداد الصفحة...</div>
    </div>

    <div id="landingPage" style="display:none;">...</div>

    <div id="fullApp" class="app-container" style="display:none;">
        <div class="hero-bg"><img id="mainHeroImg" src="" class="hero-img"></div>
        <div class="fog-panel">
            <div class="header-content">
                <div class="name-wrapper"><h1 id="brandName">جاري التحميل...</h1></div>
                <span id="brandTitle" class="title-text" style="direction:ltr;"></span>
            </div>

            <div class="action-row">
                <div class="shard-btn" onclick="openPhoneSheet()"><i class="fa-solid fa-phone"></i></div>
                <a id="topMapLink" href="#" class="shard-btn" target="_blank"><i class="fa-solid fa-map-location-dot"></i></a>
                <div class="shard-btn" onclick="openBooking()"><i class="fa-solid fa-clock"></i></div>
                <div class="shard-btn" onclick="copyURL()"><i class="fa-solid fa-link"></i></div>
            </div>

            <div class="save-btn" onclick="showIOSAlert('حفظ جهة الاتصال', 'سيتم تنزيل ملف جهة الاتصال قريباً.')">حفظ جهة الاتصال</div>

            <div id="socialSection" style="display:none;">...</div>

            <div class="section-label">الخدمات والحجوزات</div>
            <a href="#" class="glass-card" onclick="openBooking()">
                <div class="card-icon" style="color:var(--ios-blue);"><i class="fa-solid fa-calendar-check"></i></div>
                <div class="card-text"><strong style="color:var(--dark-navy);">احجز ميعاد الآن</strong><span>جدولة مواعيدك وحجوزاتك معنا</span></div>
            </a>

            </div>
    </div>

    <div class="booking-modal" id="bookingModal">
        <div class="booking-card" id="mainBookingCard">
            <div id="mainBookingSection">
                <div class="switch-tabs">
                    <div class="tab-btn active" id="tabNew" onclick="switchTab('new')">حجز ميعاد</div>
                    <div class="tab-btn"         id="tabMy"  onclick="switchTab('my')">مواعيدي</div>
                </div>

                <div id="newBookingArea">
                    <div style="margin-bottom:12px; display:flex; gap:10px;">
                        <div style="flex:1;">
                            <label style="display:block; font-size:14px; font-weight:700; margin-bottom:6px; color:var(--dark-navy);">الاسم</label>
                            <input type="text" id="visitorName" class="input-field" placeholder="اسمك الكريم">
                        </div>
                        <div style="flex:1;">
                            <label style="display:block; font-size:14px; font-weight:700; margin-bottom:6px; color:var(--dark-navy);">الهاتف</label>
                            <input type="tel" id="visitorPhone" class="input-field" placeholder="٠١xxxxxxxxx">
                        </div>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label style="display:block; font-size:15px; font-weight:700; margin-bottom:8px; color:var(--dark-navy);">نوع الكشف</label>
                        <select id="bookingType" class="input-field" onchange="window.handleTypeChange()">
                            <option value="كشف جديد" id="optNew">كشف جديد</option>
                            <option value="إعادة"     id="optFollow">إعادة</option>
                            <option value="VIP"       id="optVip">VIP (أولوية مطلقة)</option>
                        </select>
                    </div>

                    <div id="branchSelectionArea" style="margin-bottom:15px; display:none;">
                        <label style="display:block; font-size:15px; font-weight:700; margin-bottom:8px; color:var(--dark-navy);">اختر العيادة (الفرع)</label>
                        <div id="branchCardsContainer"></div>
                        <input type="hidden" id="branchSelect" value="">
                    </div>

                    <div style="margin-bottom:15px;">
                        <label style="display:block; font-size:15px; font-weight:700; margin-bottom:8px; color:var(--dark-navy);">اختر التاريخ</label>
                        <input type="date" id="bookingDate" class="input-field" onchange="window.checkAvailability()">
                    </div>

                    <div id="timeSelectionArea" style="margin-bottom:15px; display:none;">
                        <label style="display:block; font-size:15px; font-weight:700; margin-bottom:8px; color:var(--dark-navy);">اختر الساعة</label>
                        <select id="timeSelect" class="input-field">
                            <option value="" selected disabled>اختر التاريخ أولاً...</option>
                        </select>
                    </div>

                    <div id="vipMessage" style="display:none; text-align:center; margin-bottom:15px; color:var(--vip-gold); font-weight:700; font-size:18px;">
                        <i class="fa-solid fa-crown" style="font-size:24px; display:block; margin-bottom:8px;"></i>
                        حجز VIP معفى من الانتظار وتحديد الساعات
                    </div>

                    <div class="price-box" style="margin-bottom:20px; text-align:center; background:rgba(0,0,0,0.03); padding:12px; border-radius:12px; border:1px dashed #ccc; transition:0.3s;">
                        <span style="font-size:16px; font-weight:700; color:#555;">تكلفة الحجز: </span>
                        <span id="priceDisplay" style="font-size:20px; font-weight:800; color:var(--dark-navy);">٠ ج.م</span>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button style="flex:1; height:50px; border-radius:14px; border:none; background:rgba(0,0,0,0.08); color:var(--dark-navy); font-family:'Amiri',serif; font-weight:700; cursor:pointer;" onclick="closeBooking()">إغلاق</button>
                        <button id="confirmBtn" style="flex:1; height:50px; border-radius:14px; border:none; background:var(--dark-navy); color:var(--vip-gold); font-weight:700; font-family:'Amiri',serif; cursor:pointer;" onclick="window.submitBooking()">تأكيد الحجز</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="ios-alert-overlay" id="iosAlertOuter">
        <div class="ios-alert">
            <div class="ios-alert-body">
                <div class="ios-alert-title" id="iosAlertTitle">إشعار</div>
                <div class="ios-alert-message" id="iosAlertMessage"></div>
            </div>
            <button class="ios-alert-button" onclick="document.getElementById('iosAlertOuter').style.display='none'">موافق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, getDocs, deleteDoc, setDoc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        document.querySelectorAll('.dynamic-year').forEach(el => { el.innerText = new Date().getFullYear(); });

        let todayNow = new Date();
        todayNow.setMinutes(todayNow.getMinutes() - todayNow.getTimezoneOffset());
        document.getElementById('bookingDate').min = todayNow.toISOString().split('T')[0];

        const firebaseConfig = {
            apiKey: "AIzaSyAxxWhIBlC92x_T4lBjDj7p7B3hrvhVZYg",
            authDomain: "alaqrab-system.firebaseapp.com",
            projectId: "alaqrab-system",
            storageBucket: "alaqrab-system.firebasestorage.app",
            messagingSenderId: "660494503813",
            appId: "1:660494503813:web:3f45fc069b3506f8657eec",
            measurementId: "G-YHT6ZJJ8J3"
        };
        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        function getHashUserId() { return window.location.hash.replace(/^#\/?/, '').trim() || null; }
        let targetUserId = getHashUserId();

        let clinicSettings = { priceNew: 0, priceFollow: 0, priceVip: 0, capacity: 50, workFrom: "09:00", workTo: "17:00", offDays: [], holidays: [], enableBranches: false, branches: [], advancedSchedules: null };

        const _loader = document.getElementById('aqrab-loader');
        
        /* ── Evaporation Loader Function ── */
        let loaderStartTime = 0;
        function hideLoaderWithDelay() {
            const elapsed = Date.now() - loaderStartTime;
            const remainingTime = Math.max(0, 5000 - elapsed); 
            setTimeout(() => {
                _loader.classList.add('evaporate'); // Triggers Scale Down & Fade Out
                setTimeout(() => { _loader.style.display = 'none'; }, 800);
            }, remainingTime);
        }

        window.toArabicDigits  = (str) => str.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        window.showIOSAlert    = (title, msg) => {
            document.getElementById('iosAlertTitle').textContent   = title;
            document.getElementById('iosAlertMessage').textContent = msg;
            document.getElementById('iosAlertOuter').style.display = 'flex';
        };
        
        /* ── Smart Toast Notification ── */
        window.showToast = (msg) => {
            const toast = document.getElementById('glassToast');
            toast.innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--ios-blue);"></i> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        };

        window.openBooking  = () => { document.getElementById('bookingModal').style.display = 'flex'; window.switchTab('new'); };
        window.closeBooking = () => document.getElementById('bookingModal').style.display = 'none';

        if (targetUserId) {
            loaderStartTime = Date.now();
            _loader.style.display = 'flex';
            document.getElementById('fullApp').style.display = 'none';

            let firstSnap = true;
            onSnapshot(doc(db, "users", targetUserId), (docSnap) => {
                if (!docSnap.exists() || docSnap.data().isActive === false) {
                    if (firstSnap) { firstSnap = false; hideLoaderWithDelay(); }
                    return;
                }
                const data = docSnap.data();
                document.getElementById('fullApp').style.display = 'block';

                /* Populate basic details omitted here to keep snippet focused, logic is identical to yours */

                clinicSettings.enableBranches    = data.enableBranches    || false;
                clinicSettings.branches          = data.branches          || [];
                clinicSettings.advancedSchedules = data.advancedSchedules || null;
                clinicSettings.offDays           = data?.offDays          || [];
                clinicSettings.holidays          = data?.holidays         || [];

                /* ── Generate Glass Branch Cards ── */
                if (clinicSettings.enableBranches && clinicSettings.branches.length > 0) {
                    document.getElementById('branchSelectionArea').style.display = 'block';
                    const bCont = document.getElementById('branchCardsContainer');
                    bCont.innerHTML = '';
                    clinicSettings.branches.forEach((b, i) => {
                        let daysText = "متاح طوال الأسبوع";
                        if(b.schedules) {
                            const daysMap = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
                            let wDays = [];
                            for(let d=0; d<7; d++) { if(b.schedules[d] && !b.schedules[d].isOff) wDays.push(daysMap[d]); }
                            if(wDays.length > 0) daysText = `أيام العمل: ${wDays.join('، ')}`;
                            else daysText = "الفرع مغلق حالياً";
                        }
                        bCont.innerHTML += `
                        <div class="branch-card" onclick="window.selectBranch(${i}, this)">
                            <div class="b-title"><span><i class="fa-solid fa-location-dot" style="margin-left:8px;"></i>${b.name}</span> <i class="fa-solid fa-circle-check check-icon"></i></div>
                            <div class="b-days">${daysText}</div>
                        </div>`;
                    });
                }

                if (firstSnap) { firstSnap = false; hideLoaderWithDelay(); }
            });
        }

        window.selectBranch = (index, el) => {
            document.getElementById('branchSelect').value = index;
            document.querySelectorAll('.branch-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            window.handleBranchChange();
        };

        window.handleBranchChange = () => {
            document.getElementById('bookingDate').value = '';
            document.getElementById('timeSelectionArea').style.display = 'none';
        };

        /* ── Smart Date Logic ── */
        window.checkAvailability = async () => {
            const type = document.getElementById('bookingType').value;
            if (type === 'VIP') return;

            let activeScheduleObj = clinicSettings.advancedSchedules;

            if (clinicSettings.enableBranches && clinicSettings.branches.length > 0) {
                const bi = document.getElementById('branchSelect').value;
                if (!bi) { document.getElementById('bookingDate').value = ''; return window.showToast("يرجى اختيار العيادة أولاً."); }
                const branch = clinicSettings.branches[bi];
                if (branch.schedules) activeScheduleObj = branch.schedules;
            }

            const dateVal = document.getElementById('bookingDate').value;
            if (!dateVal) return;
            const dow = new Date(dateVal).getDay();

            // Check if day is blocked or closed!
            if (activeScheduleObj && activeScheduleObj[dow]) {
                if (activeScheduleObj[dow].isOff) {
                    document.getElementById('bookingDate').value = ''; 
                    document.getElementById('timeSelectionArea').style.display = 'none';
                    return window.showToast("عفواً، العيادة مغلقة في هذا اليوم.");
                }
            } else if (clinicSettings.offDays.includes(dow) || clinicSettings.holidays.includes(dateVal)) { 
                document.getElementById('bookingDate').value = ''; 
                document.getElementById('timeSelectionArea').style.display = 'none';
                return window.showToast("عفواً، اليوم المختار عطلة رسمية."); 
            }

            document.getElementById('timeSelectionArea').style.display = 'block';
            // Time logic stays the same...
        };

        /* ── Silent Copy + Toast ── */
        window.copyURL = async () => {
            let shareUrl = window.location.origin + window.location.pathname + (targetUserId ? '#/' + targetUserId : '');
            try {
                await navigator.clipboard.writeText(shareUrl);
                window.showToast("تم نسخ الرابط بنجاح");
            } catch(e) {
                window.showIOSAlert("نسخ يدوي", shareUrl);
            }
        };

    </script>
</body>
</html>
